<!DOCTYPE html>
<html lang="de">
<head>
<script>
  (function () {
    try {
      var saved = localStorage.getItem('eisstation_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    } catch (e) {}
  })();
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eisstation - Statistik</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="app-header">
  <div class="logo">
    <span class="emoji">🍦</span>
    <div><h1 class="font-display">Eisstation</h1><p>Verkaufsstatistik</p></div>
  </div>
  <div id="theme-switcher" class="row" style="gap:6px;width:auto;"></div>
</header>
<nav class="tabs" id="tabs"></nav>
<main>
  <h2 class="font-display">Statistik</h2>
  <div class="row" style="gap:8px;margin-bottom:20px;justify-content:flex-start;">
    <button class="btn btn-ghost" id="subtab-btn-stats" onclick="showSubtab('stats')">Verkaufsstatistik</button>
    <button class="btn btn-ghost" id="subtab-btn-orders" onclick="showSubtab('orders')">Bestellungen</button>
  </div>

  <div id="subtab-stats">
    <div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:flex-start;">
      <select id="f-year"></select>
      <select id="f-month">
        <option value="">Alle Monate</option>
        <option value="1">Januar</option><option value="2">Februar</option><option value="3">März</option>
        <option value="4">April</option><option value="5">Mai</option><option value="6">Juni</option>
        <option value="7">Juli</option><option value="8">August</option><option value="9">September</option>
        <option value="10">Oktober</option><option value="11">November</option><option value="12">Dezember</option>
      </select>
      <input type="date" id="f-day" />
      <button class="btn btn-ghost" onclick="clearDay()">Tag zurücksetzen</button>
      <button class="btn btn-ghost" onclick="exportStatsCsv()">⬇ Als CSV exportieren</button>
    </div>
    <div class="grid grid-2col">
      <div class="panel">
        <h3 class="font-display" id="stat-period"></h3>
        <table style="width:100%;border-collapse:collapse;" id="stat-table"></table>
      </div>
      <div>
        <div class="panel-alt">
          <p class="small">Gesamterlös im Zeitraum</p>
          <p class="font-mono" style="font-size:28px;font-weight:600;" id="stat-total-revenue"></p>
          <p class="small" id="stat-total-units"></p>
        </div>
      </div>
    </div>
  </div>

  <div id="subtab-orders" class="hidden">
    <p class="small" style="margin-bottom:12px;">Alle Bestellungen (auch vergangene Tage) - nach Zeitraum filterbar.</p>
    <div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:flex-start;">
      <select id="o-year"></select>
      <select id="o-month">
        <option value="">Alle Monate</option>
        <option value="1">Januar</option><option value="2">Februar</option><option value="3">März</option>
        <option value="4">April</option><option value="5">Mai</option><option value="6">Juni</option>
        <option value="7">Juli</option><option value="8">August</option><option value="9">September</option>
        <option value="10">Oktober</option><option value="11">November</option><option value="12">Dezember</option>
      </select>
      <input type="date" id="o-day" />
      <button class="btn btn-ghost" onclick="clearOrderDay()">Tag zurücksetzen</button>
      <button class="btn btn-ghost" onclick="exportOrdersCsv()">⬇ Als CSV exportieren</button>
    </div>
    <input id="o-search" placeholder="Suche nach Bestellnummer oder Telefonnummer" style="width:100%;box-sizing:border-box;margin-bottom:16px;" />
    <div class="stack" id="orders-list"></div>
  </div>
</main>
<script src="/js/theme.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth-gate.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/statistik.js"></script>
</body>
</html>
